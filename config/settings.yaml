oci:
  config_file: ~/.oci/config
  profile: DEFAULT
  tenancy_ocid: null
  regions:
    - ap-seoul-1

scope:
  mode: dev
  dev_base_compartment_name_or_ocid: haksu
  include_root_resources: false
  exception_file: config/autostop_compartment_exception.txt

execution:
  default_dry_run: true
  max_workers: 4
  stop_wait_timeout_seconds: 900
  stop_wait_interval_seconds: 20

retry:
  max_attempts: 4
  base_delay_seconds: 1.0
  max_delay_seconds: 16.0

logging:
  directory: logs
  level: INFO
  summary_directory: logs/summary
