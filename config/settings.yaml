oci:
  config_file: ~/.oci/config
  profile: <YOUR_PROFILE>
  tenancy_ocid: <YOUR_TENANCY_OCID>
  regions:
    - ap-seoul-1
    - ap-chuncheon-1
    - ap-osaka-1
    - ap-tokyo-1
    - ap-sydney-1
    - ap-melbourne-1
    - me-riyadh-1
    - me-jeddah-1
    - sa-saopaulo-1
    - eu-frankfurt-1
    - uk-london-1
    - us-ashburn-1
    - us-chicago-1
    - us-phoenix-1
    - us-sanjose-1
  excluded_regions: []

scope:
  mode: dev
  dev_base_compartment_name_or_ocid: <YOUR_DEV_BASE_COMPARTMENT_OCID_OR_NAME>
  include_root_resources: false
  exception_file: config/autostop_compartment_exception.txt

execution:
  default_dry_run: true
  max_workers: 4
  post_check_delay_seconds: 60
  post_check_max_workers: 4
  stop_wait_timeout_seconds: 900
  stop_wait_interval_seconds: 20

retry:
  max_attempts: 4
  base_delay_seconds: 1.0
  max_delay_seconds: 16.0

logging:
  directory: logs
  level: INFO
  summary_directory: logs/summary
  backup_count: 30
